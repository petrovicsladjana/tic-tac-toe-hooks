name: Sprotna integracija - Tic Tac Toe

on:
  push:

jobs:
  python-310:
    name: Python 3.10 preverjanje
    runs-on: ubuntu-latest

    steps:
      - name: Prenos repozitorija
        uses: actions/checkout@v4

      - name: Nastavitev Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Namestitev odvisnosti
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zagon unit testov
        run: |
          cd py_version
          python -m unittest test_tictactoe.py

      - name: Statična analiza s flake8
        run: |
          flake8 py_version --exit-zero

      - name: Varnostna analiza z bandit
        run: |
          bandit -r py_version || true

  python-311:
    name: Python 3.11 preverjanje
    runs-on: ubuntu-latest

    steps:
      - name: Prenos repozitorija
        uses: actions/checkout@v4

      - name: Nastavitev Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Namestitev odvisnosti
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zagon unit testov s coverage
        run: |
          cd py_version
          coverage run -m unittest test_tictactoe.py
          coverage report

      - name: Statična analiza s pylint
        run: |
          pylint py_version/minimax.py || true

      - name: Varnostna analiza z bandit
        run: |
          bandit -r py_version || true